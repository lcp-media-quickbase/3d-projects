<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — LCP 3D Resource Manager</title>
<link rel="stylesheet" href="shared.css">
<style>
  .admin-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .table-container {
    flex: 1;
    overflow: auto;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .inline-edit {
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 2px 6px;
    width: 100%;
  }
  .inline-edit:focus { outline: none; }
  .row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
  tr:hover .row-actions { opacity: 1; }
  .pod-dot-lg { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 12px 0;
  }
  .section-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .tab-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; }
  .status-active { color: var(--success); }
  .status-inactive { color: var(--text-dim); }
  .capacity-bar {
    height: 6px; border-radius: 3px; background: var(--surface3); overflow: hidden; width: 80px;
  }
  .capacity-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
</style>
</head>
<body>

<script src="shared.js"></script>
<script>
// ─── STATE ─────────────────────────────────────────────────
let people = [];
let allPeople = [];
let projects = [];
let allProjects = [];
let pods = [];
let activeTab = 'people';
let searchTerm = '';

// ─── BUILD PAGE ────────────────────────────────────────────
document.body.innerHTML = `
  ${renderNav('admin')}
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title"><span>⚙</span> Admin Console</div>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search..." id="searchInput" oninput="onSearch(this.value)">
        </div>
        <button class="btn btn-primary" id="btnAdd" onclick="handleAdd()">+ Add Person</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="people" onclick="switchTab('people')">People</button>
      <button class="tab" data-tab="projects" onclick="switchTab('projects')">Projects</button>
      <button class="tab" data-tab="pods" onclick="switchTab('pods')">PODs</button>
      <button class="tab" data-tab="overview" onclick="switchTab('overview')">Overview</button>
    </div>

    <!-- OVERVIEW TAB -->
    <div class="tab-content" id="tab-overview">
      <div class="page-body">
        <div class="admin-grid" id="overviewCards"></div>
        <div class="section-header"><div class="section-title">POD Composition</div></div>
        <div id="podComposition"></div>
      </div>
    </div>

    <!-- PEOPLE TAB -->
    <div class="tab-content active" id="tab-people">
      <div class="page-body-flush">
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width:30px">#</th>
                <th>Name</th>
                <th>Email</th>
                <th>POD</th>
                <th>Role</th>
                <th>Status</th>
                <th>TD ID</th>
                <th style="width:80px"></th>
              </tr>
            </thead>
            <tbody id="peopleBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- PROJECTS TAB -->
    <div class="tab-content" id="tab-projects">
      <div class="page-body-flush">
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width:60px">Proj #</th>
                <th>Name</th>
                <th>Stage</th>
                <th>POD</th>
                <th>Type</th>
                <th style="width:80px"></th>
              </tr>
            </thead>
            <tbody id="projectsBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- PODS TAB -->
    <div class="tab-content" id="tab-pods">
      <div class="page-body">
        <div id="podsGrid"></div>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-item">Active People: <span class="stat-value" id="statActivePeople">0</span></div>
      <div class="stat-item">Active Projects: <span class="stat-value" id="statActiveProjects">0</span></div>
      <div class="stat-item">PODs: <span class="stat-value" id="statPods">0</span></div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>
`;

// ─── TAB SWITCHING ─────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id===`tab-${tab}`));

  const addBtn = document.getElementById('btnAdd');
  if (tab==='people') { addBtn.textContent='+ Add Person'; addBtn.style.display=''; }
  else if (tab==='projects') { addBtn.textContent='+ Add Project'; addBtn.style.display=''; }
  else { addBtn.style.display='none'; }

  renderCurrentTab();
}

function renderCurrentTab() {
  if (activeTab==='people') renderPeopleTable();
  else if (activeTab==='projects') renderProjectsTable();
  else if (activeTab==='pods') renderPodsView();
  else if (activeTab==='overview') renderOverview();
}

// ─── SEARCH ────────────────────────────────────────────────
const onSearch = debounce(function(val) {
  searchTerm = val.toLowerCase();
  renderCurrentTab();
}, 200);

// ─── PEOPLE TABLE ──────────────────────────────────────────
function renderPeopleTable() {
  const filtered = allPeople.filter(p => {
    if (!searchTerm) return true;
    return p.name.toLowerCase().includes(searchTerm) ||
           (p.email||'').toLowerCase().includes(searchTerm) ||
           p.pod.toLowerCase().includes(searchTerm);
  });

  const tbody = document.getElementById('peopleBody');
  tbody.innerHTML = filtered.map(p => {
    const pc = podColor(p.pod);
    const statusClass = p.active ? 'status-active' : 'status-inactive';
    const statusText = p.active ? 'Active' : 'Inactive';
    return `<tr>
      <td class="cell-mono">${p.id}</td>
      <td class="cell-name">${escapeHtml(p.name)}</td>
      <td>${escapeHtml(p.email)||'<span style="color:var(--text-dim)">—</span>'}</td>
      <td><span class="pod-dot-lg" style="background:${pc}"></span>${escapeHtml(p.pod)}</td>
      <td>${escapeHtml(p.role)||'—'}</td>
      <td><span class="badge ${p.active?'badge-success':'badge-neutral'}">${statusText}</span></td>
      <td class="cell-mono">${p.tdId||'—'}</td>
      <td>
        <div class="row-actions">
          <button class="btn btn-sm" onclick="editPerson(${p.id})">Edit</button>
          <button class="btn btn-sm ${p.active?'btn-danger':'btn-success'}" onclick="togglePersonActive(${p.id})">${p.active?'Deactivate':'Activate'}</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('statActivePeople').textContent = allPeople.filter(p=>p.active).length;
}

// ─── PROJECTS TABLE ────────────────────────────────────────
function renderProjectsTable() {
  const filtered = allProjects.filter(p => {
    if (!searchTerm) return true;
    return p.name.toLowerCase().includes(searchTerm) ||
           String(p.number).includes(searchTerm) ||
           (p.pod||'').toLowerCase().includes(searchTerm) ||
           (p.stage||'').toLowerCase().includes(searchTerm);
  });

  const tbody = document.getElementById('projectsBody');
  tbody.innerHTML = filtered.map(p => {
    const stageColor = p.stage==='In Production'?'badge-info':p.stage==='Pre-Production'?'badge-warning':'badge-neutral';
    return `<tr>
      <td class="cell-mono">${p.number||'—'}</td>
      <td class="cell-name">${escapeHtml(p.name)}</td>
      <td><span class="badge ${stageColor}">${escapeHtml(p.stage)||'—'}</span></td>
      <td>${escapeHtml(p.pod)||'—'}</td>
      <td>${escapeHtml(p.type)||'—'}</td>
      <td>
        <div class="row-actions">
          <button class="btn btn-sm" onclick="editProject(${p.id})">Edit</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('statActiveProjects').textContent = allProjects.filter(p=>p.stage!=='Complete').length;
}

// ─── PODS VIEW ─────────────────────────────────────────────
function renderPodsView() {
  const podGroups = {};
  allPeople.filter(p=>p.active).forEach(p => {
    (podGroups[p.pod] = podGroups[p.pod] || []).push(p);
  });

  let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">';
  for (const [pod, members] of Object.entries(podGroups).sort((a,b)=>a[0].localeCompare(b[0]))) {
    const c = podColor(pod);
    html += `<div class="card" style="border-top:3px solid ${c}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <span class="dot" style="background:${c};width:12px;height:12px"></span>
        <span style="font-size:15px;font-weight:700">${escapeHtml(pod)}</span>
        <span class="badge badge-neutral" style="margin-left:auto">${members.length} members</span>
      </div>`;
    members.forEach(m => {
      const initials = m.name.split(' ').map(w=>w[0]||'').join('').slice(0,2);
      html += `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="width:28px;height:28px;border-radius:50%;background:${c};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">${initials}</div>
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--text)">${escapeHtml(m.name)}</div>
          <div style="font-size:11px;color:var(--text-dim)">${escapeHtml(m.email)||'No email'}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  html += '</div>';
  document.getElementById('podsGrid').innerHTML = html;
  document.getElementById('statPods').textContent = Object.keys(podGroups).length;
}

// ─── OVERVIEW ──────────────────────────────────────────────
function renderOverview() {
  const activePeopleCount = allPeople.filter(p=>p.active).length;
  const inactivePeopleCount = allPeople.filter(p=>!p.active).length;
  const preProd = allProjects.filter(p=>p.stage==='Pre-Production').length;
  const inProd = allProjects.filter(p=>p.stage==='In Production').length;
  const complete = allProjects.filter(p=>p.stage==='Complete').length;
  const podCount = new Set(allPeople.filter(p=>p.active).map(p=>p.pod)).size;

  document.getElementById('overviewCards').innerHTML = `
    <div class="card"><div class="card-title">Active Team</div><div class="card-value">${activePeopleCount}</div><div class="card-sub">${inactivePeopleCount} inactive</div></div>
    <div class="card"><div class="card-title">In Production</div><div class="card-value" style="color:var(--accent)">${inProd}</div><div class="card-sub">${preProd} pre-production</div></div>
    <div class="card"><div class="card-title">Completed</div><div class="card-value" style="color:var(--success)">${complete}</div><div class="card-sub">all time</div></div>
    <div class="card"><div class="card-title">Active PODs</div><div class="card-value">${podCount}</div><div class="card-sub">${Math.round(activePeopleCount/podCount*10)/10} avg members</div></div>
  `;

  // POD composition bars
  const podGroups = {};
  allPeople.filter(p=>p.active).forEach(p => { (podGroups[p.pod]=podGroups[p.pod]||[]).push(p); });
  const maxPod = Math.max(...Object.values(podGroups).map(m=>m.length));

  let compHtml = '<div style="display:flex;flex-direction:column;gap:8px">';
  for (const [pod, members] of Object.entries(podGroups).sort((a,b)=>b[1].length-a[1].length)) {
    const c = podColor(pod);
    const pct = (members.length/maxPod*100);
    compHtml += `<div style="display:flex;align-items:center;gap:12px">
      <span style="min-width:120px;font-size:13px;font-weight:500;color:var(--text)">${escapeHtml(pod)}</span>
      <div style="flex:1;height:24px;background:var(--surface2);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${c};border-radius:4px;display:flex;align-items:center;padding:0 8px">
          <span style="font-size:11px;font-weight:600;color:#fff">${members.length}</span>
        </div>
      </div>
    </div>`;
  }
  compHtml += '</div>';
  document.getElementById('podComposition').innerHTML = compHtml;
}

// ─── EDIT MODALS ───────────────────────────────────────────
function editPerson(id) {
  const p = allPeople.find(x=>x.id===id);
  if (!p) return;
  const podOptions = [...new Set(allPeople.map(x=>x.pod))].filter(Boolean);

  document.getElementById('modalContent').innerHTML = `
    <h3>Edit Person</h3>
    <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="editName" value="${escapeHtml(p.name)}"></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="editEmail" value="${escapeHtml(p.email||'')}"></div>
    <div class="form-group"><label class="form-label">Role</label><input class="form-input" id="editRole" value="${escapeHtml(p.role||'')}"></div>
    <div class="form-group">
      <label class="form-label">POD</label>
      <select class="form-select" id="editPod">
        ${podOptions.map(po=>`<option ${po===p.pod?'selected':''}>${escapeHtml(po)}</option>`).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePerson(${id})">Save</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('visible');
}

async function savePerson(id) {
  const name = document.getElementById('editName').value;
  const email = document.getElementById('editEmail').value;
  const role = document.getElementById('editRole').value;
  // Note: Pod is a relationship, so changing it requires updating the FK on People table
  // For now we save name, email, role
  try {
    await qbUpsert(TABLES.people, [{
      [FIELD.PEOPLE.id]: {value: id},
      [FIELD.PEOPLE.name]: {value: name},
      [FIELD.PEOPLE.email]: {value: email},
      [FIELD.PEOPLE.role]: {value: role}
    }]);
    closeModal();
    showToast('Person updated','success');
    allPeople = await loadPeople(false);
    renderCurrentTab();
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

async function togglePersonActive(id) {
  const p = allPeople.find(x=>x.id===id);
  if (!p) return;
  try {
    await qbUpsert(TABLES.people, [{
      [FIELD.PEOPLE.id]: {value: id},
      [FIELD.PEOPLE.active]: {value: !p.active}
    }]);
    showToast(p.active ? 'Person deactivated' : 'Person activated', 'success');
    allPeople = await loadPeople(false);
    renderCurrentTab();
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

function editProject(id) {
  const p = allProjects.find(x=>x.id===id);
  if (!p) return;
  document.getElementById('modalContent').innerHTML = `
    <h3>Edit Project</h3>
    <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="editProjName" value="${escapeHtml(p.name)}"></div>
    <div class="form-group"><label class="form-label">Stage</label>
      <select class="form-select" id="editProjStage">
        ${PROJECT_STAGES.map(s=>`<option ${s===p.stage?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject(${id})">Save</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('visible');
}

async function saveProject(id) {
  const name = document.getElementById('editProjName').value;
  const stage = document.getElementById('editProjStage').value;
  try {
    await qbUpsert(TABLES.projects, [{
      [FIELD.PROJECTS.id]: {value: id},
      [FIELD.PROJECTS.name]: {value: name},
      [FIELD.PROJECTS.stage]: {value: stage}
    }]);
    closeModal();
    showToast('Project updated','success');
    allProjects = await loadProjects(false);
    renderCurrentTab();
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

// ─── ADD NEW ───────────────────────────────────────────────
function handleAdd() {
  if (activeTab==='people') addPerson();
  else if (activeTab==='projects') addProject();
}

function addPerson() {
  const podOptions = [...new Set(allPeople.map(x=>x.pod))].filter(Boolean);
  document.getElementById('modalContent').innerHTML = `
    <h3>Add Person</h3>
    <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="editName" placeholder="Full name"></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="editEmail" placeholder="email@lcpmedia.com"></div>
    <div class="form-group"><label class="form-label">Role</label><input class="form-input" id="editRole" placeholder="e.g. 3D Artist"></div>
    <div class="form-group">
      <label class="form-label">POD</label>
      <select class="form-select" id="editPod">
        <option value="">Select POD...</option>
        ${podOptions.map(po=>`<option>${escapeHtml(po)}</option>`).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createPerson()">Create</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('visible');
}

async function createPerson() {
  const name = document.getElementById('editName').value;
  const email = document.getElementById('editEmail').value;
  if (!name) { showToast('Name is required','warning'); return; }
  try {
    await qbUpsert(TABLES.people, [{
      [FIELD.PEOPLE.name]: {value: name},
      [FIELD.PEOPLE.email]: {value: email},
      [FIELD.PEOPLE.role]: {value: document.getElementById('editRole').value},
      [FIELD.PEOPLE.active]: {value: true}
    }]);
    closeModal();
    showToast('Person created','success');
    allPeople = await loadPeople(false);
    renderCurrentTab();
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

function addProject() {
  document.getElementById('modalContent').innerHTML = `
    <h3>Add Project</h3>
    <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="editProjName" placeholder="Project name"></div>
    <div class="form-group"><label class="form-label">Stage</label>
      <select class="form-select" id="editProjStage">
        ${PROJECT_STAGES.map(s=>`<option>${s}</option>`).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createProject()">Create</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('visible');
}

async function createProject() {
  const name = document.getElementById('editProjName').value;
  if (!name) { showToast('Name is required','warning'); return; }
  try {
    await qbUpsert(TABLES.projects, [{
      [FIELD.PROJECTS.name]: {value: name},
      [FIELD.PROJECTS.stage]: {value: document.getElementById('editProjStage').value}
    }]);
    closeModal();
    showToast('Project created','success');
    allProjects = await loadProjects(false);
    renderCurrentTab();
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('visible'); }
document.getElementById('modalOverlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });

// ─── INIT ──────────────────────────────────────────────────
async function init() {
  if (!initAuth()) return;
  try {
    [allPeople, allProjects, pods] = await Promise.all([
      loadPeople(false),
      loadProjects(false),
      loadPods()
    ]);
    renderCurrentTab();
  } catch(e) { showToast('Error loading: '+e.message,'error'); }
}
init();
</script>
</body>
</html>
