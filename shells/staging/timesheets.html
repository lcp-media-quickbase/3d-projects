<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCP 3D Resource Manager</title>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0f1117}
iframe{width:100%;height:100%;border:none}
.loader{display:flex;align-items:center;justify-content:center;height:100%;color:#565a6e;font-family:system-ui;flex-direction:column}
.spinner{width:24px;height:24px;border:2px solid #2a2d3a;border-top-color:#6c8cff;border-radius:50%;animation:s .8s linear infinite;margin-bottom:12px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="spinner"></div>Loading...</div>
<script>
// QB Code Page shell — loads full page from GitHub via jsDelivr CDN
// Source: https://github.com/lcp-media-quickbase/project-management/blob/main/codepages/timesheets.html
//
// Cache bust every 5 min during dev. For stable production, remove ?_t param.
var cacheBust = '?_t=' + Math.floor(Date.now() / 300000);
var cdn = 'https://cdn.jsdelivr.net/gh/lcp-media-quickbase/project-management@staging/codepages';

Promise.all([
  fetch(cdn + '/shared.css' + cacheBust).then(r => r.text()),
  fetch(cdn + '/shared.js' + cacheBust).then(r => r.text()),
  fetch(cdn + '/timesheets.html' + cacheBust).then(r => r.text())
]).then(function(results) {
  var css = results[0];
  var js = results[1];
  var html = results[2];

  // Parse the page HTML
  var parser = new DOMParser();
  var doc = parser.parseFromString(html, 'text/html');

  // Extract page-specific styles
  var pageStyles = '';
  doc.querySelectorAll('style').forEach(function(s) { pageStyles += s.outerHTML; });

  // Extract page body (without script tags)
  var bodyContent = doc.body.innerHTML;
  // Remove script tags from body content - we'll handle them separately
  var tmp = document.createElement('div');
  tmp.innerHTML = bodyContent;
  tmp.querySelectorAll('script').forEach(function(s) { s.remove(); });
  bodyContent = tmp.innerHTML;

  // Extract inline scripts
  var scripts = [];
  doc.body.querySelectorAll('script:not([src])').forEach(function(s) {
    scripts.push(s.textContent);
  });

  // Build the full page
  document.getElementById('loader').remove();

  // Inject shared CSS
  var styleEl = document.createElement('style');
  styleEl.textContent = css;
  document.head.appendChild(styleEl);

  // Inject page-specific styles
  if (pageStyles) {
    document.head.insertAdjacentHTML('beforeend', pageStyles);
  }

  // Inject body content
  document.body.innerHTML = bodyContent;

  // Inject shared.js
  var sharedScript = document.createElement('script');
  sharedScript.textContent = js;
  document.body.appendChild(sharedScript);

  // Execute page-specific scripts
  scripts.forEach(function(code) {
    var s = document.createElement('script');
    s.textContent = code;
    document.body.appendChild(s);
  });

}).catch(function(e) {
  document.getElementById('loader').innerHTML =
    '<div style="color:#ff4757;font-size:14px">Failed to load: ' + e.message + '</div>' +
    '<div style="color:#565a6e;font-size:12px;margin-top:8px">Source: github.com/lcp-media-quickbase/project-management</div>';
});
</script>
</body>
</html>
