<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCP 3D Resource Manager</title>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0f1117}
.loader{display:flex;align-items:center;justify-content:center;height:100%;color:#565a6e;font-family:system-ui;flex-direction:column}
.spinner{width:24px;height:24px;border:2px solid #2a2d3a;border-top-color:#6c8cff;border-radius:50%;animation:s .8s linear infinite;margin-bottom:12px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="spinner"></div>Loading...</div>
<script>
var REPO = 'lcp-media-quickbase/3d-projects';

function fetchRetry(url, n, d) {
  return fetch(url).then(function(r) {
    if (!r.ok) {
      if (n > 0) return new Promise(function(ok){setTimeout(ok,d);}).then(function(){return fetchRetry(url,n-1,d*2);});
      throw new Error(url.split('/').pop() + ' ' + r.status);
    }
    return r;
  });
}

fetch('https://api.github.com/repos/' + REPO + '/tags?per_page=1')
  .then(function(r) { return r.json(); })
  .then(function(tags) {
    var v = (tags && tags[0]) ? tags[0].name : 'main';
    window._cdnBase = 'https://cdn.jsdelivr.net/gh/' + REPO + '@' + v + '/codepages';
    document.getElementById('loader').lastChild.textContent = 'Loading ' + v + '...';
    return Promise.all([
      fetchRetry(window._cdnBase + '/shared.css', 2, 1000).then(function(r){return r.text();}),
      fetchRetry(window._cdnBase + '/shared.js', 2, 1000).then(function(r){return r.text();}),
      fetchRetry(window._cdnBase + '/dashboard.html', 2, 1000).then(function(r){return r.text();})
    ]);
  })
  .then(function(res) {
    var css = res[0], js = res[1], html = res[2];
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');

    // Extract styles
    var ps = ''; doc.querySelectorAll('style').forEach(function(s){ps += s.outerHTML;});

    // Extract body without scripts
    var tmp = document.createElement('div');
    tmp.innerHTML = doc.body.innerHTML;
    tmp.querySelectorAll('script').forEach(function(s){s.remove();});

    // Extract inline scripts
    var scripts = [];
    doc.body.querySelectorAll('script:not([src])').forEach(function(s){scripts.push(s.textContent);});

    // Extract script[src] for dynamic loading
    var srcScripts = [];
    doc.body.querySelectorAll('script[src]').forEach(function(s){srcScripts.push(s.getAttribute('src'));});

    // Build page
    document.getElementById('loader').remove();
    var el = document.createElement('style'); el.textContent = css; document.head.appendChild(el);
    if (ps) document.head.insertAdjacentHTML('beforeend', ps);
    document.body.innerHTML = tmp.innerHTML;

    // Run shared.js
    var s1 = document.createElement('script'); s1.textContent = js; document.body.appendChild(s1);

    // Run first inline script (bootstrap)
    if (scripts[0]) { var s2 = document.createElement('script'); s2.textContent = scripts[0]; document.body.appendChild(s2); }

    // Dynamically fetch and run all script[src] from CDN
    var chain = Promise.resolve();
    srcScripts.forEach(function(src) {
      chain = chain.then(function() {
        return fetchRetry(window._cdnBase + '/' + src, 2, 1000).then(function(r){return r.text();});
      }).then(function(code) {
        var s = document.createElement('script'); s.textContent = code; document.body.appendChild(s);
      });
    });

    // After all tab scripts loaded, run remaining inline scripts (buildDashboard)
    return chain.then(function() {
      for (var i = 1; i < scripts.length; i++) {
        var s = document.createElement('script'); s.textContent = scripts[i]; document.body.appendChild(s);
      }
    });
  }).catch(function(e) {
    document.getElementById('loader').innerHTML =
      '<div style="color:#ff4757;font-size:14px">Failed to load: ' + e.message + '</div>' +
      '<div style="color:#565a6e;font-size:12px;margin-top:8px">Try refreshing (Ctrl+Shift+R)</div>';
  });
</script>
</body>
</html>
