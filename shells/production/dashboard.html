<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCP 3D Resource Manager</title>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0f1117}
.loader{display:flex;align-items:center;justify-content:center;height:100%;color:#565a6e;font-family:system-ui;flex-direction:column}
.spinner{width:24px;height:24px;border:2px solid #2a2d3a;border-top-color:#6c8cff;border-radius:50%;animation:s .8s linear infinite;margin-bottom:12px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="spinner"></div>Loading...</div>
<script>
var REPO = 'lcp-media-quickbase/3d-projects';
var FILES = ['shared.css', 'shared.js', 'dashboard.html',
  'tabs/scheduler.js', 'tabs/vacations.js', 'tabs/preproduction.js',
  'tabs/quotes.js', 'tabs/reports.js', 'tabs/timesheets.js', 'tabs/admin.js'];

function fetchWithRetry(url, retries, delay) {
  return fetch(url).then(function(r) {
    if (!r.ok) {
      if (retries > 0) {
        return new Promise(function(res) { setTimeout(res, delay); })
          .then(function() { return fetchWithRetry(url, retries - 1, delay * 2); });
      }
      throw new Error(url.split('/').pop() + ' returned ' + r.status);
    }
    return r;
  });
}

fetch('https://api.github.com/repos/' + REPO + '/tags?per_page=1')
  .then(function(r) { return r.json(); })
  .then(function(tags) {
    var version = (tags && tags[0]) ? tags[0].name : 'main';
    var cdn = 'https://cdn.jsdelivr.net/gh/' + REPO + '@' + version + '/codepages';
    document.getElementById('loader').lastChild.textContent = 'Loading ' + version + '...';

    return Promise.all(FILES.map(function(f) {
      return fetchWithRetry(cdn + '/' + f, 2, 1000).then(function(r) { return r.text(); });
    }));
  })
  .then(function(results) {
    var css = results[0];       // shared.css
    var sharedJs = results[1];  // shared.js
    var dashHtml = results[2];  // dashboard.html
    var tabScripts = results.slice(3); // tab JS files

    // Parse dashboard.html
    var parser = new DOMParser();
    var doc = parser.parseFromString(dashHtml, 'text/html');

    // Extract page-level styles
    var pageStyles = '';
    doc.querySelectorAll('style').forEach(function(s) { pageStyles += s.outerHTML; });

    // Extract body content (without scripts)
    var bodyContent = doc.body.innerHTML;
    var tmp = document.createElement('div');
    tmp.innerHTML = bodyContent;
    tmp.querySelectorAll('script').forEach(function(s) { s.remove(); });
    bodyContent = tmp.innerHTML;

    // Extract inline scripts from dashboard.html
    var inlineScripts = [];
    doc.body.querySelectorAll('script:not([src])').forEach(function(s) {
      inlineScripts.push(s.textContent);
    });

    // Build the page
    document.getElementById('loader').remove();

    // 1. CSS
    var styleEl = document.createElement('style');
    styleEl.textContent = css;
    document.head.appendChild(styleEl);
    if (pageStyles) document.head.insertAdjacentHTML('beforeend', pageStyles);

    // 2. Body content
    document.body.innerHTML = bodyContent;

    // 3. shared.js (must run first — provides globals)
    var s1 = document.createElement('script');
    s1.textContent = sharedJs;
    document.body.appendChild(s1);

    // 4. First inline script (bootstrap — initAuth, detectRole, registerTab setup)
    if (inlineScripts[0]) {
      var s2 = document.createElement('script');
      s2.textContent = inlineScripts[0];
      document.body.appendChild(s2);
    }

    // 5. Tab scripts
    tabScripts.forEach(function(code) {
      var s = document.createElement('script');
      s.textContent = code;
      document.body.appendChild(s);
    });

    // 6. Remaining inline scripts (buildDashboard call)
    for (var i = 1; i < inlineScripts.length; i++) {
      var s = document.createElement('script');
      s.textContent = inlineScripts[i];
      document.body.appendChild(s);
    }

  }).catch(function(e) {
    document.getElementById('loader').innerHTML =
      '<div style="color:#ff4757;font-size:14px">Failed to load: ' + e.message + '</div>' +
      '<div style="color:#565a6e;font-size:12px;margin-top:8px">Try refreshing (Ctrl+Shift+R). Source: github.com/' + REPO + '</div>';
  });
</script>
</body>
</html>
