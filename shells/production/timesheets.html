<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCP 3D Resource Manager</title>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0f1117}
.loader{display:flex;align-items:center;justify-content:center;height:100%;color:#565a6e;font-family:system-ui;flex-direction:column}
.spinner{width:24px;height:24px;border:2px solid #2a2d3a;border-top-color:#6c8cff;border-radius:50%;animation:s .8s linear infinite;margin-bottom:12px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="spinner"></div>Loading...</div>
<script>
var PAGE = 'timesheets.html';
var REPO = 'lcp-media-quickbase/3d-projects';

// Step 1: Get latest tag from GitHub API
fetch('https://api.github.com/repos/' + REPO + '/tags?per_page=1')
  .then(function(r) { return r.json(); })
  .then(function(tags) {
    var version = (tags && tags[0]) ? tags[0].name : 'main';
    var cdn = 'https://cdn.jsdelivr.net/gh/' + REPO + '@' + version + '/codepages';

    // Step 2: Load all files from tagged CDN URL
    return Promise.all([
      fetch(cdn + '/shared.css').then(function(r) { return r.text(); }),
      fetch(cdn + '/shared.js').then(function(r) { return r.text(); }),
      fetch(cdn + '/' + PAGE).then(function(r) { return r.text(); })
    ]);
  })
  .then(function(results) {
    var css = results[0];
    var js = results[1];
    var html = results[2];

    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');

    var pageStyles = '';
    doc.querySelectorAll('style').forEach(function(s) { pageStyles += s.outerHTML; });

    var bodyContent = doc.body.innerHTML;
    var tmp = document.createElement('div');
    tmp.innerHTML = bodyContent;
    tmp.querySelectorAll('script').forEach(function(s) { s.remove(); });
    bodyContent = tmp.innerHTML;

    var scripts = [];
    doc.body.querySelectorAll('script:not([src])').forEach(function(s) {
      scripts.push(s.textContent);
    });

    document.getElementById('loader').remove();

    var styleEl = document.createElement('style');
    styleEl.textContent = css;
    document.head.appendChild(styleEl);

    if (pageStyles) {
      document.head.insertAdjacentHTML('beforeend', pageStyles);
    }

    document.body.innerHTML = bodyContent;

    var sharedScript = document.createElement('script');
    sharedScript.textContent = js;
    document.body.appendChild(sharedScript);

    scripts.forEach(function(code) {
      var s = document.createElement('script');
      s.textContent = code;
      document.body.appendChild(s);
    });

  }).catch(function(e) {
    document.getElementById('loader').innerHTML =
      '<div style="color:#ff4757;font-size:14px">Failed to load: ' + e.message + '</div>' +
      '<div style="color:#565a6e;font-size:12px;margin-top:8px">Source: github.com/' + REPO + '</div>';
  });
</script>
</body>
</html>
